services:
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: apextrade
      POSTGRES_USER: apextrade_user
      POSTGRES_PASSWORD: apextrade_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - trading-net

  python-service:
    build: ./backend-python
    ports:
      - "8000:8000"
    networks:
      - trading-net

  java-service:
    build: ./backend-java
    ports:
      - "8080:8080"
    depends_on:
      - python-service
      - postgres
    environment:
      PYTHON_SERVICE_URL: http://python-service:8000
    networks:
      - trading-net

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - java-service
    networks:
      - trading-net

networks:
  trading-net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
